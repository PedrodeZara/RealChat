version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: RealChat
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  php:
    build: .
    container_name: php
    volumes:
      - .:/app
    working_dir: /app
    command: php -S 0.0.0.0:8000
    ports:
      - "8000:8000"

volumes:
  mysql_data:
